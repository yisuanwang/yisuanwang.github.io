---
layout: compress
---

<!doctype html>
<html lang="en" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body class="{% if page.url == '/' %}layout-home{% endif %}">

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <div id="main" role="main">
      {% include sidebar.html %}

      <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
        {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
        <div class="page__inner-wrap">
          <section class="page__content" itemprop="text">
            {{ content }}
          </section>
        </div>
      </article>
    </div>

    {% include scripts.html %}

    <script>
      // Scroll reveal
      (function(){
        if (!('IntersectionObserver' in window)) return;
        var els = document.querySelectorAll('.home-hero, .home-section, .profile_box');
        els.forEach(function(el){ el.classList.add('sr'); });
        var obs = new IntersectionObserver(function(entries){
          entries.forEach(function(e){
            if (e.isIntersecting) { e.target.classList.add('sr--visible'); obs.unobserve(e.target); }
          });
        }, { threshold: 0.06 });
        els.forEach(function(el){ obs.observe(el); });
      })();
    </script>

  </body>
</html>
